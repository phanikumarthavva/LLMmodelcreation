name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Lint
        run: ruff check app tests

      - name: Test
        run: pytest tests/ -v

  docker-build:
    runs-on: ubuntu-latest
    needs: lint-and-test
    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t llm-api .

  ai-security:
    runs-on: ubuntu-latest
    needs: lint-and-test
    env:
      MODEL_ID: distilgpt2
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install -r requirements-ai-security.txt

      - name: ModelScan + PickleScan
        run: python scripts/ai_security_scan.py

      - name: Generate AIBOM (OWASP CycloneDX)
        run: bash scripts/generate_aibom.sh

      - name: Upload AI security reports
        uses: actions/upload-artifact@v4
        with:
          name: ai-security-reports
          path: reports/
          if-no-files-found: error

  app-security:
    runs-on: ubuntu-latest
    needs: lint-and-test
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt pip-audit

      - name: Dependency scan
        run: pip-audit -r requirements.txt

      - name: Secret scan
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Build image for container scan
        run: docker build -t llm-api:scan .

      - name: Container scan
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: llm-api:scan
          format: table
          exit-code: "1"
          severity: CRITICAL,HIGH
          ignore-unfixed: true
