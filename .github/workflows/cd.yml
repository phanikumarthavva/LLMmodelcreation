name: CD

on:
  workflow_run:
    workflows: [CI]
    types: [completed]
    branches: [main]

jobs:
  build-and-push:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract image metadata
        id: meta
        run: |
          IMAGE="ghcr.io/${{ github.repository }}"
          SHA="${{ github.event.workflow_run.head_sha }}"
          echo "image=${IMAGE,,}" >> "$GITHUB_OUTPUT"
          echo "tag=sha-${SHA}" >> "$GITHUB_OUTPUT"

      - name: Build and push Docker image
        run: |
          docker build -t ${{ steps.meta.outputs.image }}:latest \
                       -t ${{ steps.meta.outputs.image }}:${{ steps.meta.outputs.tag }} .
          docker push ${{ steps.meta.outputs.image }}:latest
          docker push ${{ steps.meta.outputs.image }}:${{ steps.meta.outputs.tag }}

      - name: Publish image summary
        run: |
          echo "### Docker image published" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "- \`${{ steps.meta.outputs.image }}:latest\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- \`${{ steps.meta.outputs.image }}:${{ steps.meta.outputs.tag }}\`" >> "$GITHUB_STEP_SUMMARY"
